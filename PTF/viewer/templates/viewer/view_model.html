<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ model.name }} – Dinenics</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0d1a1f; color: #e8ddd0; font-family: 'Segoe UI', system-ui, sans-serif; }
    #container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Dish name overlay — shown inside the AR canvas */
    #dish-label {
      position: absolute;
      top: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(13,26,31,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(166,81,17,0.4);
      border-radius: 999px;
      padding: 0.45rem 1.4rem;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      white-space: nowrap;
      color: #DDAA00;
    }
    model-viewer {
      width: 100%;
      flex: 1;
      background: transparent;
      --poster-color: transparent;
    }
    /* AR button */
    #ar-btn {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #A65111;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.85rem 2.4rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(166,81,17,0.4);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 10;
    }
    #ar-btn:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 8px 32px rgba(166,81,17,0.55); }
    #ar-btn svg { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div id="container">
    <div id="dish-label">{{ model.name }}</div>
    <model-viewer
      id="viewer"
      src="{{ model.glb_file.url }}"
      {% if model.usdz_file %}ios-src="{{ model.usdz_file.url }}"{% endif %}
      alt="{{ model.name }}"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      style="background: transparent;">
      <!-- The slot button triggers native AR -->
      <button slot="ar-button" id="ar-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        View in AR
      </button>
    </model-viewer>
  </div>
  <script>
    // Hide the label when AR session starts (it'll be in camera view already)
    const viewer = document.getElementById('viewer');
    const label  = document.getElementById('dish-label');
    viewer.addEventListener('ar-status', (e) => {
      if (e.detail.status === 'session-started') {
        label.style.display = 'none';
      } else {
        label.style.display = '';
      }
    });
  </script>
</body>
</html>
