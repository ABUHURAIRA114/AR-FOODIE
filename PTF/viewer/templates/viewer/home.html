<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 3D Models</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .model-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .view-btn {
            background-color: #4285F4;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>My 3D Models</h1>

    {% if models %}
        {% for model in models %}
            <div class="model-item">
                <span>{{ model.name }}</span>
                <a class="view-btn" href="{% url 'view_model' model.pk %}">View in AR</a>
            </div>
        {% endfor %}
    {% else %}
        <p>No models uploaded yet. Add one via the <a href="/admin/">admin panel</a>.</p>
    {% endif %}
</body>
</html>
